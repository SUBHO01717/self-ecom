{% extends "base.html" %}
{% block content %}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "{{ category.name|escapejs }}",
  "description": "{{ category.description|escapejs }}",
  "url": "{{ request.build_absolute_uri }}"
}
</script>

<section class="mx-auto max-w-7xl px-4 py-10">
  <h1 class="text-3xl font-bold">{{ category.name }}</h1>
  <p class="mt-2 max-w-3xl text-slate-600">{{ category.description }}</p>
  <div class="mt-8 grid grid-cols-2 gap-4 md:grid-cols-4">
    {% for product in products %}{% include "includes/product_card.html" %}{% empty %}<p class="col-span-full">No products in this category.</p>{% endfor %}
  </div>
</section>
{% endblock %}
